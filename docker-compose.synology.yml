# Synology NAS: host paths for music library and persistent data.
# Usage: docker compose -f docker-compose.yml -f docker-compose.synology.yml up -d --build
#
# Do NOT use docker-compose.dev.yml on the NAS.

services:
  app:
    volumes: !override
      - /volume1/music:/music
      - ./cookies:/cookies:ro
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage

  worker:
    volumes: !override
      - /volume1/music:/music
      - ./cookies:/cookies:ro
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage

  scheduler:
    volumes: !override
      - ./database:/var/www/html/database
      - ./storage:/var/www/html/storage
