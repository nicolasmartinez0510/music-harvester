# Production-safe defaults: app code (vendor, frontend) lives in the image.
# Local dev: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
# Synology:  docker compose -f docker-compose.yml -f docker-compose.synology.yml up -d --build

services:
  app:
    build:
      context: .
      target: app
    image: music-harvester-app
    restart: unless-stopped
    volumes:
      - music_data:/music
      - ./cookies:/cookies:ro
      - app_database:/var/www/html/database
      - app_storage:/var/www/html/storage
    environment: &app_env
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      MUSIC_PATH: /music
      COOKIES_PATH: /cookies/cookies.txt
    healthcheck:
      # Becomes healthy once the migrations table exists (app entrypoint migrated).
      test: ["CMD", "php", "artisan", "migrate:status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  worker:
    image: music-harvester-app
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=3600
    volumes:
      - music_data:/music
      - ./cookies:/cookies:ro
      - app_database:/var/www/html/database
      - app_storage:/var/www/html/storage
    environment: *app_env
    depends_on:
      app:
        condition: service_healthy

  scheduler:
    image: music-harvester-app
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - app_database:/var/www/html/database
      - app_storage:/var/www/html/storage
    environment: *app_env
    depends_on:
      app:
        condition: service_healthy

  nginx:
    build:
      context: .
      target: nginx
    image: music-harvester-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8085}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  music_data:
  app_database:
  app_storage:
