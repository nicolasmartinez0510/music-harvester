services:
  app:
    build:
      context: .
      target: app
    image: music-harvester-app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - music_data:/music
      - ./cookies:/cookies:ro
    environment: &app_env
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/html/database/database.sqlite
      QUEUE_CONNECTION: database
      MUSIC_PATH: /music
      COOKIES_PATH: /cookies/cookies.txt

  worker:
    image: music-harvester-app
    restart: unless-stopped
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=3600
    volumes:
      - .:/var/www/html
      - music_data:/music
      - ./cookies:/cookies:ro
    environment: *app_env
    depends_on:
      - app

  scheduler:
    image: music-harvester-app
    restart: unless-stopped
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - music_data:/music
      - ./cookies:/cookies:ro
    environment: *app_env
    depends_on:
      - app

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8085}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  music_data:
