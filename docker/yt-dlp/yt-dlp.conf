# yt-dlp global config (mounted at /etc/yt-dlp.conf).
# Deno is bundled in the image and on PATH; yt-dlp >= 2025.11.12 auto-detects it
# as the JS runtime, so we do NOT pass --js-runtimes here (that option also
# crashes older yt-dlp builds with "no such option: --js-runtimes").
--extractor-args
youtube:player_client=web_safari,web,mweb,android
--format
bestaudio[protocol=https]/bestaudio[protocol^=http]/bestaudio/best
--downloader
ffmpeg
--retries
10
--fragment-retries
10
